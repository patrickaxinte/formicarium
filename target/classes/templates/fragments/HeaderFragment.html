<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="project-header(project, isOwner)">
    <div class="card mt-4">
        <h2 th:text="${project.name}" class="text-warning">Project Name</h2>
        <p th:text="${project.description}" class="text-light">Project Description</p>
        <p class="text-light">Owner:
            <span th:each="membership : ${project.memberships}"
                  th:if="${membership.role.equalsIgnoreCase('OWNER')}"
                  th:text="${membership.user.username}">Owner Name</span>
        </p>
    </div>
</div>
</body>
</html>
