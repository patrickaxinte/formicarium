<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
    <title>Chat - Formicarium</title>
    <link rel="icon" href="/images/logo.png" type="image/png" />
</head>
<body>
<div layout:fragment="content">

    <div class="card mb-3">
        <h3 class="card-header-title">Project Chat</h3>
    </div>

    <!-- Messages List -->
    <div class="card mb-3">
        <div class="card-body" style="max-height: 400px; overflow-y: auto;" id="chatContainer">
            <ul class="list-group" id="messagesList">
                <li class="list-group-item d-flex justify-content-between align-items-start"
                    th:each="message : ${messages}"
                    style="background-color: var(--card-bg); color: var(--text-color); border-color: var(--border-color);">
                    <div>
                        <strong th:text="${message.sender.username}">Sender</strong>:
                        <span th:text="${message.content}">Message content</span>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" th:text="${#temporals.format(message.sentAt, 'dd MMM yyyy HH:mm')}">Timestamp</span>
                        <form th:if="${message.sender.username == #authentication.name}"
                              th:action="@{/chat/delete/{id}(id=${message.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </li>
            </ul>
            <p th:if="${#lists.isEmpty(messages)}" class="text-muted text-center mt-3" id="noMessages">No messages yet. Start the conversation!</p>
        </div>
    </div>

    <!-- Send Message Form -->
    <div class="card">
        <div class="card-body">
            <form onsubmit="sendMessage(event)" class="d-flex gap-2">
                <input type="text" id="messageContent" class="form-control" placeholder="Type a message..." required>
                <button type="submit" class="btn btn-custom">
                    <i class="bi bi-send"></i> Send
                </button>
            </form>
        </div>
    </div>

    <!-- Back button -->
    <div class="mt-3">
        <a th:href="@{/chat}" class="btn btn-secondary">Back to Chats</a>
    </div>

    <!-- Add STOMP and SockJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
        var stompClient = null;
        var projectId = /*[[${projectId}]]*/ '0';
        var currentUsername = /*[[${#authentication.name}]]*/ '';

        function connect() {
            var socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                console.log('Connected: ' + frame);
                stompClient.subscribe('/topic/chat/' + projectId, function (chatMessage) {
                    showGreeting(JSON.parse(chatMessage.body));
                });
            });
        }

        function sendMessage(event) {
            event.preventDefault();
            var messageContent = document.getElementById('messageContent').value.trim();
            if(messageContent && stompClient) {
                stompClient.send("/app/chat/" + projectId, {}, JSON.stringify({'content': messageContent}));
                document.getElementById('messageContent').value = '';
            }
        }

        function showGreeting(message) {
            var messagesList = document.getElementById('messagesList');
            var noMessages = document.getElementById('noMessages');
            if (noMessages) {
                noMessages.style.display = 'none';
            }

            var li = document.createElement('li');
            li.className = "list-group-item d-flex justify-content-between align-items-start";
            li.style.backgroundColor = 'var(--card-bg)';
            li.style.color = 'var(--text-color)';
            li.style.borderColor = 'var(--border-color)';

            var divLeft = document.createElement('div');
            divLeft.innerHTML = '<strong>' + message.senderUsername + '</strong>: ' +
                                '<span>' + message.content + '</span>';

            var divRight = document.createElement('div');
            divRight.className = "d-flex align-items-center gap-2";
            divRight.innerHTML = '<span class="text-muted">' + message.sentAt + '</span>';

            if (message.senderUsername === currentUsername) {
                var form = document.createElement('form');
                form.action = '/chat/delete/' + message.id;
                form.method = 'post';
                form.className = 'd-inline';
                form.innerHTML = '<button type="submit" class="btn btn-sm btn-danger">Delete</button>';
                divRight.appendChild(form);
            }

            li.appendChild(divLeft);
            li.appendChild(divRight);
            messagesList.appendChild(li);

            // Auto-scroll to bottom
            var chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        document.addEventListener("DOMContentLoaded", function() {
            connect();
            var chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        });
    </script>
</div>
</body>
</html>
