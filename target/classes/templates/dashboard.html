<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
  <title th:text="${headerTitle}">Dashboard - Formicarium</title>
  <link rel="icon" href="/images/dashboard.png" type="image/png" />
</head>
<body>
<div layout:fragment="content">
  
  <h2 class="mb-4" style="color: var(--text-color);">Hello, <span sec:authentication="name" style="color: var(--primary-color);">User</span>!</h2>
  
  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card">
      <i class="bi bi-folder-check stat-icon"></i>
      <div class="stat-value" th:text="${activeProjectsCount}">0</div>
      <div class="stat-label">Active Projects</div>
    </div>
    <div class="stat-card">
      <i class="bi bi-list-task stat-icon"></i>
      <div class="stat-value" th:text="${pendingTasksCount}">0</div>
      <div class="stat-label">Pending Tasks</div>
    </div>
    <div class="stat-card">
      <i class="bi bi-check-circle stat-icon" style="color: #4cd137;"></i>
      <div class="stat-value" th:text="${completedTasksCount}">0</div>
      <div class="stat-label">Completed Tasks</div>
    </div>
  </div>

  <!-- User's Tasks Card -->
  <div class="card card-static mb-4">
    <!-- Card Header -->
    <div class="card-header pb-3" style="border-bottom: 2px solid var(--border-color); background: none; padding: 0;">
      <h3 class="card-header-title m-0">My Recent Tasks</h3>
    </div>

    <!-- Card Body -->
    <div class="card-body pt-3 px-0 pb-0">
      <!-- If no tasks -->
      <div th:if="${#lists.isEmpty(myTasks)}" class="alert alert-info" style="background-color: var(--input-bg); border: none; color: var(--text-color);">
        You have no tasks assigned to you at this moment.
      </div>

      <!-- If tasks exist -->
      <div th:unless="${#lists.isEmpty(myTasks)}">
        <ul class="list-group list-group-flush" style="border-radius: 8px; overflow: hidden;">
          <li class="list-group-item d-flex justify-content-between align-items-center"
              th:each="task : ${myTasks}" style="background-color: var(--input-bg); color: var(--text-color); border-bottom: 1px solid rgba(255,255,255,0.1);">
            
            <!-- Task details -->
            <div>
              <strong th:text="${task.name}" style="color: var(--primary-color);">Task Name</strong>
              <p class="mb-0 mt-1" th:text="${task.description}" style="font-size: 0.9em; color: var(--secondary-text);">Task Description</p>
            </div>

            <!-- Task Status Badge -->
            <span class="badge" 
                  th:text="${task.status}"
                  th:classappend="${task.status == 'COMPLETED' ? 'bg-success' : (task.status == 'IN_PROGRESS' ? 'bg-primary' : 'bg-secondary')}">
              STATUS
            </span>
          </li>
        </ul>
      </div>
    </div>
  </div>

</div>
</body>
</html>
