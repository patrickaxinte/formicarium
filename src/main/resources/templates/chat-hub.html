<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="base">
<head>
    <title>Group Chats - Formicarium</title>
    <link rel="icon" href="/images/logo.png" type="image/png" />
</head>
<body>
<div layout:fragment="content">

    <div class="card mb-4">
        <h3 class="card-header-title">Your Project Chats</h3>
        <p>Select a project to open its group chat.</p>
    </div>

    <!-- If no projects -->
    <div th:if="${#lists.isEmpty(projects)}" class="card text-center">
        <div class="card-body">
            <i class="bi bi-chat-dots" style="font-size: 3rem; color: var(--primary-color);"></i>
            <p class="mt-3">You are not a member of any active projects yet.</p>
            <a th:href="@{/projects}" class="btn btn-custom">Browse Projects</a>
        </div>
    </div>

    <!-- Project list -->
    <div th:unless="${#lists.isEmpty(projects)}">
        <div th:each="project : ${projects}" class="card mb-3">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1" th:text="${project.name}">Project Name</h5>
                    <p class="mb-0 text-muted" th:text="${project.description}">Description</p>
                </div>
                <a th:href="@{/chat/{id}(id=${project.id})}" class="btn btn-custom">
                    <i class="bi bi-chat-dots me-1"></i> Open Chat
                </a>
            </div>
        </div>
    </div>

</div>
</body>
</html>
